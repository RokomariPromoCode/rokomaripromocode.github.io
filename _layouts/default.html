<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">

  <!-- SITE_BASE for JS -->
  <script>
    (function(){
      var rawBase = "{{ site.baseurl | default: '' }}";
      rawBase = String(rawBase || '').trim();
      if(rawBase === "" || rawBase === "/") { window.SITE_BASE = ""; }
      else {
        if(rawBase[0] !== "/") rawBase = "/" + rawBase;
        rawBase = rawBase.replace(/\/$/, "");
        window.SITE_BASE = rawBase;
      }
    })();
  </script>
</head>
<body>

  <!-- Option A: Jekyll include (works if page uses this layout) -->
  {% include header.html %}

  <!-- Option B: Runtime injection: some pages may choose to use the inject script instead -->
  {{ content }}

  {% include footer.html %}
  {% include wa.html %}

  <!-- Inject script (optional). If you want to inject header/footer with one tag on pages that don't use layout,
       include this file via <script src="/assets/inject-includes.js"></script> -->
  <script src="{{ '/assets/inject-includes.js' | relative_url }}"></script>

  <!-- App loader (cards + search + home special behavior) -->
  <script src="{{ '/assets/app.js' | relative_url }}"></script>
</body>
</html>
