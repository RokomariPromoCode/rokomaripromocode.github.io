---
layout: default
title: Card Search Demo
---
<section class="container">
  <h1>Card Generator / Search</h1>
  <div class="search-container">
    <input id="cards-search" type="search" placeholder="Search by title, author, sku..." />
    <button id="cards-search-btn" type="button">Search</button>
    <select id="cards-json-selector">
      <option value="/data/books.json">books.json</option>
      <option value="/data/default.json">default.json</option>
    </select>
    <button id="load-json" type="button">Load JSON</button>
  </div>

  <div id="cards-area" class="cards-grid"></div>
</section>

<script src="/assets/cards.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  const selector = document.getElementById('cards-json-selector');
  const searchInput = document.getElementById('cards-search');
  const loadBtn = document.getElementById('load-json');
  const searchBtn = document.getElementById('cards-search-btn');

  loadBtn && loadBtn.addEventListener('click', ()=>{
    loadCardsJSON(selector.value, 'cards-area');
  });

  searchBtn && searchBtn.addEventListener('click', ()=>{
    cardsSearch(searchInput.value, 'cards-area');
  });

  searchInput && searchInput.addEventListener('input', (e)=>{
    cardsSearch(e.target.value, 'cards-area');
  });

  if(selector) loadCardsJSON(selector.value, 'cards-area');
});
</script>
